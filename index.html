function slugify(n) { return n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
function uid()      { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function searchCourses(query, custom=[]) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase();
  const map = {};
  PRESET_COURSES.forEach(c => map[c.id]=c);
  custom.forEach(c => map[c.id]={...c,isCustom:true});
  return Object.values(map).filter(c =>
    c.name.toLowerCase().includes(q) || c.location.toLowerCase().includes(q)
  ).slice(0,10);
}

// ── Share Card (Canvas) ───────────────────────────────────────
async function generateShareCard(golferName, courses) {
  const W=1080, H=1500, PAD=72;
  const canvas = document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext('2d');
  try {
    await Promise.all([
      new FontFace('Playfair Display','url(https://fonts.gstatic.com/s/playfairdisplay/v37/nuFiD-vYSZviVYUb_rj3ij__anPXDTnCjmHKM4nYO7KN_qiTbtA.woff2)',{weight:'700'}).load(),
    ].map(p=>p.then(f=>document.fonts.add(f))));
  } catch(_){}
  await document.fonts.ready;
  const C={bg:'#f5efe3',card:'#ffffff',green:'#3a6644',text:'#2a2a24',light:'#9e9e8f',border:'#ddd6c8'};
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(58,102,68,0.04)'; ctx.lineWidth=1;
  for(let y=0;y<H;y+=18){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const hdrH=190;
  ctx.fillStyle=C.green; ctx.fillRect(0,0,W,hdrH);
  ctx.font='60px serif'; ctx.textAlign='center'; ctx.fillText('⛳',W/2,66);
  ctx.fillStyle='#fff'; ctx.font='bold 68px "Playfair Display",Georgia,serif';
  ctx.fillText('Course Rank',W/2,130);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='26px monospace';
  ctx.fillText('GOLF COURSE RANKINGS',W/2,168);
  const nameY=hdrH+50;
  ctx.fillStyle=C.text; ctx.font='italic 48px "Playfair Display",Georgia,serif';
  ctx.fillText(golferName+"'s Top Courses",W/2,nameY);
  ctx.strokeStyle=C.border; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(PAD,nameY+20); ctx.lineTo(W-PAD,nameY+20); ctx.stroke();
  const cardX=PAD,cardW=W-PAD*2,cardH=90,cardGap=11,startY=nameY+46;
  courses.slice(0,10).forEach((course,i)=>{
    const y=startY+i*(cardH+cardGap);
    ctx.shadowColor='rgba(42,42,36,0.07)'; ctx.shadowBlur=10; ctx.shadowOffsetY=3;
    roundRect(ctx,cardX,y,cardW,cardH,12); ctx.fillStyle=C.card; ctx.fill();
    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
    roundRect(ctx,cardX,y,6,cardH,[12,0,0,12]);
    ctx.fillStyle=i<3?C.green:C.border; ctx.fill();
    ctx.fillStyle=i<3?C.green:C.light;
    ctx.font=`italic ${i<3?'42':'36'}px "Playfair Display",Georgia,serif`;
    ctx.textAlign='right';
    ctx.fillText(String(i+1),cardX+86,y+cardH/2+14);
    ctx.strokeStyle=C.border; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cardX+98,y+18); ctx.lineTo(cardX+98,y+cardH-18); ctx.stroke();
    const maxW=cardW-118;
    ctx.fillStyle=C.text; ctx.font='28px "Playfair Display",Georgia,serif'; ctx.textAlign='left';
    ctx.fillText(truncateText(ctx,course.name,maxW),cardX+114,y+cardH/2-2);
    ctx.fillStyle=C.light; ctx.font='20px monospace';
    ctx.fillText(truncateText(ctx,course.location||'',maxW),cardX+114,y+cardH/2+24);
  });
  const footerY=H-80;
  ctx.strokeStyle=C.border; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(PAD,footerY-10); ctx.lineTo(W-PAD,footerY-10); ctx.stroke();
  ctx.fillStyle=C.light; ctx.font='24px monospace'; ctx.textAlign='center';
  ctx.fillText('course-rank-fawn.vercel.app',W/2,footerY+26);
  ctx.fillStyle=C.green; ctx.font='italic 26px "Playfair Display",Georgia,serif';
  ctx.fillText('Golf Course Rankings',W/2,footerY+60);
  return canvas.toDataURL('image/png');
}

function roundRect(ctx,x,y,w,h,r){
  if(typeof r==='number') r=[r,r,r,r];
  const[tl,tr,br,bl]=r;
  ctx.beginPath();
  ctx.moveTo(x+tl,y); ctx.lineTo(x+w-tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
  ctx.lineTo(x+w,y+h-br); ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  ctx.lineTo(x+bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
  ctx.lineTo(x,y+tl); ctx.quadraticCurveTo(x,y,x+tl,y);
  ctx.closePath();
}
function truncateText(ctx,text,maxW){
  if(ctx.measureText(text).width<=maxW) return text;
  let t=text;
  while(ctx.measureText(t+'…').width>maxW&&t.length>0) t=t.slice(0,-1);
  return t+'…';
}

// ── Autocomplete ──────────────────────────────────────────────
function Autocomplete({placeholder,onSelect,customCourses,onAddNew}){
  const[q,setQ]=useState('');
  const[res,setRes]=useState([]);
  const[foc,setFoc]=useState(-1);
  const[open,setOpen]=useState(false);
  const wrap=useRef(null);
  useEffect(()=>{
    const h=e=>{if(wrap.current&&!wrap.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);
  function change(e){
    const v=e.target.value; setQ(v); setFoc(-1);
    if(v.length>=2){setRes(searchCourses(v,customCourses));setOpen(true);}
    else{setOpen(false);setRes([]);}
  }
  function key(e){
    if(!open) return;
    const tot=res.length+1;
    if(e.key==='ArrowDown'){e.preventDefault();setFoc(f=>(f+1)%tot);}
    else if(e.key==='ArrowUp'){e.preventDefault();setFoc(f=>(f-1+tot)%tot);}
    else if(e.key==='Enter'){e.preventDefault(); foc>=0&&foc<res.length?pick(res[foc]):onAddNew(q);}
    else if(e.key==='Escape')setOpen(false);
  }
  function pick(c){onSelect(c);setQ('');setOpen(false);setRes([]);setFoc(-1);}
  return(
    <div ref={wrap} style={{position:'relative',marginBottom:12}}>
      <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'#3a6644',pointerEvents:'none'}}>⛳</span>
      <input value={q} onChange={change} onKeyDown={key}
        onFocus={()=>{if(q.length>=2)setOpen(true);}}
        placeholder={placeholder} autoComplete="off"
        style={{width:'100%',boxSizing:'border-box',background:'#fff',border:'1.5px solid #d8d0c0',borderRadius:8,color:'#2a2a24',fontFamily:"'Libre Baskerville',serif",fontSize:'0.88rem',padding:'10px 14px 10px 36px',outline:'none'}}/>
      {open&&(
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'#fff',border:'1.5px solid #d8d0c0',borderRadius:8,zIndex:100,maxHeight:240,overflowY:'auto',boxShadow:'0 6px 20px rgba(42,42,36,0.1)'}}>
          {res.length===0&&<div style={{padding:'12px 14px',color:'#9e9e8f',fontStyle:'italic',fontSize:'0.82rem',textAlign:'center'}}>No matches found</div>}
          {res.map((c,i)=>(
            <div key={c.id} onMouseDown={()=>pick(c)}
              style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid #f0ece4',background:foc===i?'#f4f9f5':'transparent'}}
              onMouseEnter={()=>setFoc(i)}>
              <div style={{display:'flex',alignItems:'baseline',gap:6,flexWrap:'wrap'}}>
                <span style={{fontSize:'0.86rem',color:'#2a2a24'}}>{c.name}</span>
                {c.isCustom&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.52rem',color:'#3a6644',border:'1px solid rgba(58,102,68,0.3)',borderRadius:3,padding:'1px 4px'}}>CUSTOM</span>}
                {(c.lists||[]).map(l=>(
                  <span key={l} style={{fontFamily:"'DM Mono',monospace",fontSize:'0.52rem',color:'#9e9e8f',border:'1px solid #e0d8cc',borderRadius:3,padding:'1px 4px',whiteSpace:'nowrap'}}>{LIST_LABELS[l]||l}</span>
                ))}
              </div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',color:'#9e9e8f',marginTop:2}}>{c.location}</div>
            </div>
          ))}
          <div onMouseDown={()=>onAddNew(q)}
            style={{padding:'10px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:8,borderTop:'1px solid #ede8df',color:'#3a6644',fontSize:'0.84rem',background:foc===res.length?'#f4f9f5':'transparent'}}
            onMouseEnter={()=>setFoc(res.length)}>
            <span style={{fontSize:16}}>＋</span>
            <span>Add "<strong>{q}</strong>" as a new course</span>
          </div>
        </div>
      )}
    </div>
  );
}

    const seen={},results=[];

        if(!seen[c.courseId||c.name]&&(c.name.toLowerCase().includes(q)||(c.location||'').toLowerCase().includes(q))){
          seen[c.courseId||c.name]=true;
          const playedBy=allFriends.filter(ff=>(ff.played||[]).find(x=>x.courseId===c.courseId)).map(ff=>ff.name);

// ── Main App ──────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);          // Firebase Auth user object
  const[authLoading,setAuthLoading]=useState(true); // waiting for auth state
  const[signInLoading,setSignInLoading]=useState(false);
  const[played,setPlayed]=useState([]);
  const[bucket,setBucket]=useState([]);
  const[friends,setFriends]=useState([]);

  const[modal,setModal]=useState(null);
  const[shareOpen,setShare]=useState(false);
  const[searchOpen,setSearch]=useState(false);
  const[searchQuery,setSearchQ]=useState('');
  const[unsaved,setUnsaved]=useState(false);
  const[savedFlash,setFlash]=useState(false);
  const[loading,setLoading]=useState(false);
  // Played list drag state
  const[dragFrom,setDragFrom]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const touchDragFrom=useRef(null);
  const touchDragOver=useRef(null);
  const touchClone=useRef(null);
  const touchStartY=useRef(null);
  const touchStartX=useRef(null);
  const touchDragging=useRef(false);   // true once long-press fires
  const touchLongPress=useRef(null);   // long-press timer
  const touchHoverTimer=useRef(null);
  const touchHoverCandidate=useRef(null);
  // Bucket list drag state
  const[bDragFrom,setBDragFrom]=useState(null);
  const[bDragOver,setBDragOver]=useState(null);
  const bTouchDragFrom=useRef(null);
  const bTouchDragOver=useRef(null);
  const bTouchClone=useRef(null);
  const bTouchStartY=useRef(null);
  const bTouchStartX=useRef(null);
  const bTouchDragging=useRef(false);
  const bTouchLongPress=useRef(null);
  const bTouchHoverTimer=useRef(null);
  const bTouchHoverCandidate=useRef(null);
  const bDragEnterTarget=useRef(null);

  // Convenience — display name from Google profile
  const golferName = user ? (user.displayName || user.email.split('@')[0]) : '';
  // Firestore doc ID — use uid for uniqueness, never changes across devices
  const userDocId  = user ? user.uid : null;

  // ── Auth state listener — fires on page load, login, logout ──
  useEffect(()=>{
    if(!auth) { setAuthLoading(false); return; }
    const unsub = auth.onAuthStateChanged(u=>{
      setUser(u);
      setAuthLoading(false);
    });
    return ()=>unsub();
  },[]);

  // Load data once we have a logged-in user
  useEffect(()=>{ if(user) loadMyData(); else { setPlayed([]); setBucket([]); } },[user]);
  useEffect(()=>{ if((tab==='group'||tab==='golfers') && user) loadFriends(); },[tab, user]);

  // ── Firebase ops ──
  async function loadMyData(){
    if(!db||!userDocId) return; setLoading(true);
    try{
      // Load shared custom courses
      const snap=await db.collection('courses').get();
      const cc=[]; snap.forEach(d=>cc.push(d.data())); setCustom(cc);

      // Load by uid (new format)
      let doc=await db.collection('golfers').doc(userDocId).get();

      // ── Migration: check if old name-based doc exists ──
      // If user previously saved under their display name, migrate it to uid
      if(!doc.exists && golferName){
        const oldDoc=await db.collection('golfers').doc(golferName).get();
        if(oldDoc.exists){
          // Copy old data to new uid-based doc
          const data=oldDoc.data();
          await db.collection('golfers').doc(userDocId).set({...data, name:golferName, uid:userDocId, updatedAt:new Date()});
          // Remove old doc to avoid duplicates in the group list
          await db.collection('golfers').doc(golferName).delete();
          doc=await db.collection('golfers').doc(userDocId).get();
        }
      }

      if(doc.exists){setPlayed(doc.data().played||[]);setBucket(doc.data().bucketList||[]);}
    }catch(e){console.error(e);}
    setLoading(false);
  }

  async function loadFriends(){
    if(!db) return;
    try{
      const snap=await db.collection('golfers').get();
      const all=[]; snap.forEach(d=>all.push(d.data()));
      all.sort((a,b)=>a.name===golferName?-1:b.name===golferName?1:a.name.localeCompare(b.name));
      setFriends(all);
    }catch(e){console.error(e);}
  }

  async function saveAll(){
    if(!db||!userDocId) return;
    try{
      await db.collection('golfers').doc(userDocId).set({name:golferName,uid:userDocId,played,bucketList:bucket,updatedAt:new Date()});
      setUnsaved(false); setFlash(true); setTimeout(()=>setFlash(false),2500);
    }catch(e){alert('Save failed: '+e.message);}
  }

  async function saveCustomCourse(name,location){
    const id=slugify(name);
    const course={id,name,location,isCustom:true};
    setCustom(c=>[...c,course]);
    if(db) try{await db.collection('courses').doc(id).set(course);}catch(_){}
    return course;
  }

  // ── Course actions ──
  function addCourse(course,target){
    const list=target==='played'?played:bucket;
    if(list.find(c=>c.courseId===course.id)) return;
    const item={id:uid(),courseId:course.id,name:course.name,location:course.location};
    if(target==='played') setPlayed(p=>[...p,item]); else setBucket(b=>[...b,item]);
    setUnsaved(true); setFlash(false);
  }

  async function confirmNew(name,loc){
    const course=await saveCustomCourse(name,loc);
    addCourse(course,modal.target);
    setModal(null);
  }

  // ── Drag (mouse) ──
  // ── Drag (mouse) ──
  // dragEnterCount prevents firing on every tiny mouse movement within a card
  const dragEnterTarget = useRef(null);
  function onDragStart(i){setDragFrom(i);}
  function onDragEnter(i,e){
    // Only update dragOver when entering a genuinely different card element
    if(e && e.currentTarget === dragEnterTarget.current) return;
    dragEnterTarget.current = e ? e.currentTarget : null;
    setDragOver(i);
  }
  function onDragEnd(){
    dragEnterTarget.current = null;
    if(dragFrom!==null&&dragOver!==null&&dragFrom!==dragOver){
      const arr=[...played];const[m]=arr.splice(dragFrom,1);arr.splice(dragOver,0,m);
      setPlayed(arr);setUnsaved(true);setFlash(false);
    }
    setDragFrom(null);setDragOver(null);
  }

  // ── Drag (touch) — long-press to activate ──
  // Hold 400ms → card pops → drag. Quick touch/swipe = normal scroll.

  function activateDrag(i, sourceEl) {
    touchDragging.current = true;
    setDragFrom(i);
    // Haptic feedback on supported devices
    if (navigator.vibrate) navigator.vibrate(30);
    // Pop animation on the original card
    if (sourceEl) {
      sourceEl.style.transition = 'transform 0.15s ease, box-shadow 0.15s ease';
      sourceEl.style.transform = 'scale(1.04)';
      sourceEl.style.boxShadow = '0 12px 32px rgba(42,42,36,0.22)';
      sourceEl.style.zIndex = '10';
    }
    // Create ghost clone
    const cards = document.querySelectorAll('[data-drag-index]');
    const el = cards[i];
    if (el) {
      const rect = el.getBoundingClientRect();
      const clone = el.cloneNode(true);
      clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.9;pointer-events:none;z-index:9999;border-radius:10px;box-shadow:0 12px 32px rgba(42,42,36,0.25);background:#fff;transform:scale(1.04);transition:none;border:1.5px solid #3a6644;`;
      document.body.appendChild(clone);
      touchClone.current = clone;
    }
  }

  function onTouchStart(e, i) {
    touchDragFrom.current = i;
    touchDragOver.current = i;
    touchDragging.current = false;
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
    touchHoverCandidate.current = null;
    clearTimeout(touchHoverTimer.current);
    clearTimeout(touchLongPress.current);
    // Start long-press timer — 400ms hold activates drag
    const sourceEl = e.currentTarget;
    touchLongPress.current = setTimeout(() => {
      activateDrag(i, sourceEl);
    }, 400);
  }

  function onTouchMove(e) {
    const t = e.touches[0];
    const dx = t.clientX - touchStartX.current;
    const dy = t.clientY - touchStartY.current;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // If finger moves more than 8px before long-press fires, cancel — it's a scroll
    if (!touchDragging.current) {
      if (dist > 8) {
        clearTimeout(touchLongPress.current);
        // Reset so no drag happens
        touchDragFrom.current = null;
      }
      return; // don't prevent default until drag is active — allow scroll
    }

    // Drag is active — prevent scroll
    e.preventDefault();

    // Move ghost clone
    if (touchClone.current) {
      const r = touchClone.current.getBoundingClientRect();
      touchClone.current.style.left = (t.clientX - r.width/2) + 'px';
      touchClone.current.style.top  = (t.clientY - r.height/2) + 'px';
    }

    // Hit-test card underneath
    if (touchClone.current) touchClone.current.style.display = 'none';
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (touchClone.current) touchClone.current.style.display = '';
    let tgt = el, found = null;
    while (tgt && tgt !== document.body) {
      const idx = tgt.getAttribute && tgt.getAttribute('data-drag-index');
      if (idx !== null) { found = parseInt(idx, 10); break; }
      tgt = tgt.parentElement;
    }
    if (found !== null && found !== touchDragFrom.current) {
      if (found !== touchHoverCandidate.current) {
        touchHoverCandidate.current = found;
        clearTimeout(touchHoverTimer.current);
        touchHoverTimer.current = setTimeout(() => {
          if (found !== touchDragOver.current) {
            touchDragOver.current = found;
            setDragOver(found);
          }
        }, 80);
      }
    }
  }

  function onTouchEnd() {
    clearTimeout(touchLongPress.current);
    clearTimeout(touchHoverTimer.current);
    // Reset pop animation on original card
    const cards = document.querySelectorAll('[data-drag-index]');
    if (touchDragFrom.current !== null && cards[touchDragFrom.current]) {
      const el = cards[touchDragFrom.current];
      el.style.transform = '';
      el.style.boxShadow = '';
      el.style.zIndex = '';
    }
    if (touchClone.current) { document.body.removeChild(touchClone.current); touchClone.current = null; }
    if (touchDragging.current) {
      const from = touchDragFrom.current, to = touchDragOver.current;
      if (from !== null && to !== null && from !== to) {
        const arr = [...played];
        const [m] = arr.splice(from, 1);
        arr.splice(to, 0, m);
        setPlayed(arr); setUnsaved(true); setFlash(false);
      }
    }
    touchDragFrom.current = null; touchDragOver.current = null;
    touchDragging.current = false; touchHoverCandidate.current = null;
    setDragFrom(null); setDragOver(null);
  }


  // ── Bucket list drag (mouse) ──
  function onBDragStart(i){setBDragFrom(i);}
  function onBDragEnter(i,e){
    if(e && e.currentTarget===bDragEnterTarget.current) return;
    bDragEnterTarget.current=e?e.currentTarget:null;
    setBDragOver(i);
  }
  function onBDragEnd(){
    bDragEnterTarget.current=null;
    if(bDragFrom!==null&&bDragOver!==null&&bDragFrom!==bDragOver){
      const arr=[...bucket];const[m]=arr.splice(bDragFrom,1);arr.splice(bDragOver,0,m);
      setBucket(arr);setUnsaved(true);setFlash(false);
    }
    setBDragFrom(null);setBDragOver(null);
  }

  // ── Bucket list drag (touch) — long-press to activate ──
  function activateBDrag(i, sourceEl) {
    bTouchDragging.current = true;
    setBDragFrom(i);
    if (navigator.vibrate) navigator.vibrate(30);
    if (sourceEl) {
      sourceEl.style.transition = 'transform 0.15s ease, box-shadow 0.15s ease';
      sourceEl.style.transform = 'scale(1.04)';
      sourceEl.style.boxShadow = '0 12px 32px rgba(42,42,36,0.22)';
      sourceEl.style.zIndex = '10';
    }
    const cards = document.querySelectorAll('[data-bdrag-index]');
    const el = cards[i];
    if (el) {
      const rect = el.getBoundingClientRect();
      const clone = el.cloneNode(true);
      clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.9;pointer-events:none;z-index:9999;border-radius:10px;box-shadow:0 12px 32px rgba(42,42,36,0.25);background:#fff;transform:scale(1.04);transition:none;border:1.5px solid #3a6644;`;
      document.body.appendChild(clone);
      bTouchClone.current = clone;
    }
  }

  function onBTouchStart(e, i) {
    bTouchDragFrom.current = i; bTouchDragOver.current = i;
    bTouchDragging.current = false;
    bTouchStartX.current = e.touches[0].clientX;
    bTouchStartY.current = e.touches[0].clientY;
    bTouchHoverCandidate.current = null;
    clearTimeout(bTouchHoverTimer.current);
    clearTimeout(bTouchLongPress.current);
    const sourceEl = e.currentTarget;
    bTouchLongPress.current = setTimeout(() => {
      activateBDrag(i, sourceEl);
    }, 400);
  }

  function onBTouchMove(e) {
    const t = e.touches[0];
    const dx = t.clientX - bTouchStartX.current;
    const dy = t.clientY - bTouchStartY.current;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (!bTouchDragging.current) {
      if (dist > 8) {
        clearTimeout(bTouchLongPress.current);
        bTouchDragFrom.current = null;
      }
      return;
    }
    e.preventDefault();
    if (bTouchClone.current) {
      const r = bTouchClone.current.getBoundingClientRect();
      bTouchClone.current.style.left = (t.clientX - r.width/2) + 'px';
      bTouchClone.current.style.top  = (t.clientY - r.height/2) + 'px';
    }
    if (bTouchClone.current) bTouchClone.current.style.display = 'none';
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (bTouchClone.current) bTouchClone.current.style.display = '';
    let tgt = el, found = null;
    while (tgt && tgt !== document.body) {
      const idx = tgt.getAttribute && tgt.getAttribute('data-bdrag-index');
      if (idx !== null) { found = parseInt(idx, 10); break; }
      tgt = tgt.parentElement;
    }
    if (found !== null && found !== bTouchDragFrom.current) {
      if (found !== bTouchHoverCandidate.current) {
        bTouchHoverCandidate.current = found;
        clearTimeout(bTouchHoverTimer.current);
        bTouchHoverTimer.current = setTimeout(() => {
          if (found !== bTouchDragOver.current) { bTouchDragOver.current = found; setBDragOver(found); }
        }, 80);
      }
    }
  }

  function onBTouchEnd() {
    clearTimeout(bTouchLongPress.current);
    clearTimeout(bTouchHoverTimer.current);
    const cards = document.querySelectorAll('[data-bdrag-index]');
    if (bTouchDragFrom.current !== null && cards[bTouchDragFrom.current]) {
      const el = cards[bTouchDragFrom.current];
      el.style.transform = ''; el.style.boxShadow = ''; el.style.zIndex = '';
    }
    if (bTouchClone.current) { document.body.removeChild(bTouchClone.current); bTouchClone.current = null; }
    if (bTouchDragging.current) {
      const from = bTouchDragFrom.current, to = bTouchDragOver.current;
      if (from !== null && to !== null && from !== to) {
        const arr = [...bucket];
        const [m] = arr.splice(from, 1);
        arr.splice(to, 0, m);
        setBucket(arr); setUnsaved(true); setFlash(false);
      }
    }
    bTouchDragFrom.current = null; bTouchDragOver.current = null;
    bTouchDragging.current = false; bTouchHoverCandidate.current = null;
    setBDragFrom(null); setBDragOver(null);
  }

  // ── Bayesian leaderboard ──
  function buildLB(){
    const allF=[{name:golferName,played,bucketList:bucket},...friends];
    const scores={},meta={};
    allF.forEach(f=>{
      (f.played||[]).forEach((c,i)=>{
        const k=c.courseId||slugify(c.name);
        const score=Math.max(10-i,1);
        if(!scores[k]) scores[k]=[];
        scores[k].push(score);
        if(!meta[k]) meta[k]={name:c.name,location:c.location,people:[]};
        meta[k].people.push(f.name);
      });
    });
    const allScores=Object.values(scores).flat();
    if(!allScores.length) return[];
    const m=allScores.reduce((a,b)=>a+b,0)/allScores.length;
    const C=allScores.length/Object.keys(scores).length;
    const ranked=Object.entries(scores).map(([k,arr])=>{
      const n=arr.length,sum=arr.reduce((a,b)=>a+b,0),ba=(C*m+sum)/(C+n);
      return{k,ba,n};
    }).sort((a,b)=>b.ba-a.ba).slice(0,10);
    const maxBA=ranked[0]?.ba||1,minBA=ranked[ranked.length-1]?.ba||0,range=maxBA-minBA||1;
    return ranked.map(({k,ba,n})=>({...meta[k],ba,n,pct:Math.round(40+((ba-minBA)/range)*60)}));
  }

  // ── Auth helpers ──
  async function handleSignIn(){
    if(!auth) return;
    setSignInLoading(true);
    try{
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
      // onAuthStateChanged will fire and set user automatically
    }catch(e){
      if(e.code !== 'auth/popup-closed-by-user') alert('Sign in failed: '+e.message);
    }
    setSignInLoading(false);
  }

  async function handleSignOut(){
    if(!auth) return;
    if(!confirm('Sign out of Course Rank?')) return;
    await auth.signOut();
    setPlayed([]); setBucket([]); setFriends([]);
  }
  function saveBar(showShare=false){
    return(
      <div style={{paddingTop:12,display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.62rem',color:'#b8b0a0'}}>{unsaved?'Unsaved changes':''}</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {showShare&&<button onClick={()=>setShare(true)} style={{display:'flex',alignItems:'center',gap:6,background:'#e8f0ea',border:'1.5px solid rgba(58,102,68,0.3)',borderRadius:7,color:'#3a6644',fontFamily:"'DM Mono',monospace",fontSize:'0.68rem',letterSpacing:'0.08em',textTransform:'uppercase',padding:'9px 14px',cursor:'pointer'}}>↗ Share</button>}
          {savedFlash
            ?<span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.66rem',color:'#3a6644',letterSpacing:'0.1em'}}>✓ Saved</span>
            :<button onClick={saveAll} style={{background:'#3a6644',border:'none',borderRadius:7,color:'#fff',fontFamily:"'DM Mono',monospace",fontSize:'0.7rem',letterSpacing:'0.1em',textTransform:'uppercase',padding:'9px 18px',cursor:'pointer'}}>Save & Share</button>}
        </div>
      </div>
    );
  }

  function GolferCard({f}){
    return(
      <div className="rc" onClick={()=>setProfile(f.name)}
        style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'#faf8f4',border:'1.5px solid #e0d8cc',borderRadius:10,cursor:'pointer',marginBottom:8,transition:'all 0.18s'}}>
        <div style={{width:36,height:36,borderRadius:'50%',background:'#e8f0ea',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Playfair Display',serif",fontStyle:'italic',color:'#3a6644',fontSize:'1rem',flexShrink:0}}>{f.name[0].toUpperCase()}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:'italic',color:'#2a2a24',fontSize:'0.95rem'}}>
            {f.name}{f.name===golferName&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.52rem',background:'#e8f0ea',color:'#3a6644',border:'1px solid rgba(58,102,68,0.3)',borderRadius:3,padding:'1px 5px',letterSpacing:'0.1em',textTransform:'uppercase',verticalAlign:'middle',marginLeft:6}}>You</span>}
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',color:'#9e9e8f',marginTop:3}}>{(f.played||[]).length} played · {(f.bucketList||[]).length} on bucket list</div>
        </div>
        <span style={{color:'#c8c0b0',fontSize:18}}>›</span>
      </div>
    );
  }

  function ProfileView({name}){
    const allF=[{name:golferName,played,bucketList:bucket},...friends];
    const f=allF.find(x=>x.name===name);
    if(!f) return null;
    return(
      <div style={{paddingTop:20}}>
        <button onClick={()=>setProfile(null)} style={{background:'none',border:'none',color:'#9e9e8f',fontFamily:"'DM Mono',monospace",fontSize:'0.65rem',letterSpacing:'0.1em',textTransform:'uppercase',cursor:'pointer',padding:0,marginBottom:18,display:'flex',alignItems:'center',gap:6}}>← Back to Golfers</button>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:22,paddingBottom:18,borderBottom:'1px solid #ede8df'}}>
          <div style={{width:48,height:48,borderRadius:'50%',background:'#e8f0ea',border:'1.5px solid rgba(58,102,68,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Playfair Display',serif",fontStyle:'italic',color:'#3a6644',fontSize:'1.3rem',flexShrink:0}}>{f.name[0].toUpperCase()}</div>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:'1.3rem',fontStyle:'italic',color:'#2a2a24'}}>{f.name}{f.name===golferName&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.52rem',background:'#e8f0ea',color:'#3a6644',border:'1px solid rgba(58,102,68,0.3)',borderRadius:3,padding:'1px 5px',letterSpacing:'0.1em',textTransform:'uppercase',verticalAlign:'middle',marginLeft:6}}>You</span>}</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.62rem',color:'#9e9e8f',marginTop:3}}>{(f.played||[]).length} played · {(f.bucketList||[]).length} on bucket list</div>
          </div>
        </div>
        {[['Rankings',f.played||[],true],['Bucket List',f.bucketList||[],false]].map(([title,list,ranked])=>(
          <div key={title} style={{marginBottom:22}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',letterSpacing:'0.16em',textTransform:'uppercase',color:'#9e9e8f',marginBottom:10,paddingBottom:7,borderBottom:'1px solid #ede8df'}}>{title}</div>
            {list.length===0
              ?<div style={{fontStyle:'italic',color:'#b8b0a0',fontSize:'0.84rem',padding:'8px 0'}}>Nothing here yet.</div>
              :list.map((c,i)=>(
                <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<list.length-1?'1px solid #f5f2ee':'none'}}>
                  {ranked?<span style={{fontFamily:"'Playfair Display',serif",fontStyle:'italic',fontSize:'1rem',color:'#b8b0a0',minWidth:22,textAlign:'right'}}>{i+1}</span>
                    :<span style={{width:7,height:7,borderRadius:'50%',background:'rgba(58,102,68,0.2)',border:'1.5px solid #3a6644',flexShrink:0,margin:'0 6px 0 4px'}}/>}
                  <span style={{flex:1,fontSize:'0.86rem',color:'#2a2a24'}}>{c.name}</span>
                  {c.location&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',color:'#b8b0a0'}}>{c.location}</span>}
                </div>
              ))
            }
          </div>
        ))}
      </div>
    );
  }

  // ── Not configured ──
  if(!configReady) return <ConfigWarning/>;

  // ── Auth loading — show spinner while Firebase checks session ──
  if(authLoading) return(
    <div style={{minHeight:'100vh',background:'#f2ece0',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <span style={{fontSize:32,display:'block',marginBottom:12}}>⛳</span>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.7rem',color:'#9e9e8f',letterSpacing:'0.1em'}}>Loading…</div>
      </div>
    </div>
  );

  // ── Not signed in ──
  if(!user) return <LoginScreen onSignIn={handleSignIn} loading={signInLoading}/>;

  const lb=buildLB();
  const allF=[{name:golferName,played,bucketList:bucket},...friends];
  const sectionLabel=(text)=>(
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',letterSpacing:'0.16em',textTransform:'uppercase',color:'#9e9e8f',marginBottom:12,paddingBottom:8,borderBottom:'1px solid #ede8df'}}>{text}</div>
  );

  return(
    <>
      <div className="app" style={{minHeight:'100vh',background:'#f2ece0',fontFamily:"'Libre Baskerville',Georgia,serif",color:'#2a2a24'}}>

        {/* Header */}
        <div style={{background:'#fff',borderBottom:'2px solid #3a6644',padding:'20px 20px 16px',position:'relative'}}>
          <div style={{textAlign:'center'}}>
            <span style={{fontSize:22,display:'block',marginBottom:3}}>⛳</span>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.8rem',fontWeight:700,color:'#2a2a24'}}>Course Rank</h1>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',color:'#3a6644',letterSpacing:'0.2em',textTransform:'uppercase',marginTop:4}}>Golf Course Rankings</div>
            <div onClick={handleSignOut} style={{fontFamily:"'DM Mono',monospace",fontSize:'0.58rem',color:'#9e9e8f',letterSpacing:'0.1em',marginTop:5,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            {user.photoURL && <img src={user.photoURL} style={{width:16,height:16,borderRadius:'50%'}} alt=""/>}
            {golferName} · sign out
          </div>
          </div>
          <button onClick={()=>{setSearch(true);setSearchQ('');}}
            style={{position:'absolute',top:16,right:16,background:'none',border:'1.5px solid #d8d0c0',borderRadius:8,padding:'7px 10px',cursor:'pointer',color:'#6b6b5e'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#3a6644';e.currentTarget.style.color='#3a6644';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#d8d0c0';e.currentTarget.style.color='#6b6b5e';}}>
            🔍
          </button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',maxWidth:580,margin:'0 auto',padding:'16px 16px 0'}}>
          {[['mine','Played'],['bucket','Want to Play'],['group','Top Courses'],['golfers','Golfers']].map(([t,l],i,a)=>(
            <button key={t} onClick={()=>{setTab(t);setProfile(null);}} style={{
              flex:1,background:'transparent',border:'1.5px solid #d8d0c0',borderBottom:'none',
              borderLeft:i>0?'none':undefined,
              borderRadius:i===0?'8px 0 0 0':i===a.length-1?'0 8px 0 0':'0',
              color:tab===t?'#3a6644':'#9e9e8f',
              fontFamily:"'DM Mono',monospace",fontSize:'0.54rem',letterSpacing:'0.04em',lineHeight:1.35,
              textTransform:'uppercase',padding:'10px 4px',cursor:'pointer',
              ...(tab===t?{background:'#fff',borderColor:'#3a6644',borderBottomColor:'#fff'}:{}),
            }}>{l}</button>
          ))}
        </div>

        {/* Panel */}
        <div style={{maxWidth:580,margin:'0 auto',padding:'0 16px 20px',background:'#fff',border:'1.5px solid #d8d0c0',borderTop:'none',borderRadius:'0 0 10px 10px',marginBottom:40}}>

          {/* PLAYED */}
          {tab==='mine'&&(
            <div style={{paddingTop:20}}>
              {sectionLabel("Courses I've Played — drag to rank")}
              <Autocomplete placeholder="Search for a course…" onSelect={c=>addCourse(c,'played')} customCourses={customCourses} onAddNew={q=>setModal({target:'played',prefill:q})}/>
              {played.length===0
                ?<div style={{textAlign:'center',padding:'36px 0',color:'#b8b0a0',fontStyle:'italic',fontSize:'0.88rem'}}>No rounds yet — search for a course above.</div>
                :<div onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                  {played.map((c,i)=>(
                    <CourseBubble key={c.id} course={c} rank={i+1} draggable={true} dataIndex={i}
                      dragging={dragFrom===i} isOver={dragOver===i&&dragFrom!==i}
                      onDragStart={()=>onDragStart(i)} onDragEnter={e=>onDragEnter(i,e)} onDragEnd={onDragEnd}
                      onTouchStart={e=>onTouchStart(e,i)}
                      onRemove={()=>{setPlayed(p=>p.filter(x=>x.id!==c.id));setUnsaved(true);}}/>
                  ))}
                </div>
              }
              {played.length>0&&saveBar(true)}
            </div>
          )}

          {/* BUCKET LIST */}
          {tab==='bucket'&&(
            <div style={{paddingTop:20}}>
              {sectionLabel("Courses I Want to Play — drag to reorder")}
              <Autocomplete placeholder="Search for a course…" onSelect={c=>addCourse(c,'bucket')} customCourses={customCourses} onAddNew={q=>setModal({target:'bucket',prefill:q})}/>
              {bucket.length===0
                ?<div style={{textAlign:'center',padding:'36px 0',color:'#b8b0a0',fontStyle:'italic',fontSize:'0.88rem'}}>Your dream list is empty — add courses you want to play.</div>
                :<div onTouchMove={onBTouchMove} onTouchEnd={onBTouchEnd}>
                  {bucket.map((c,i)=>(
                    <div
                      key={c.id}
                      data-bdrag-index={i}
                      draggable
                      onDragStart={()=>onBDragStart(i)}
                      onDragEnter={e=>onBDragEnter(i,e)}
                      onDragEnd={onBDragEnd}
                      onDragOver={e=>e.preventDefault()}
                      onTouchStart={e=>onBTouchStart(e,i)}
                      style={{
                        display:'flex',alignItems:'center',gap:12,
                        background:bDragOver===i&&bDragFrom!==i?'#f0f7f2':'#fff',
                        border:bDragOver===i&&bDragFrom!==i?'1.5px solid #3a6644':'1.5px solid #e0d8cc',
                        borderRadius:10,padding:'11px 14px',marginBottom:7,
                        cursor:'grab',opacity:bDragFrom===i?0.4:1,
                        transition:'border-color 0.15s,background 0.15s,opacity 0.15s',
                        boxShadow:bDragOver===i&&bDragFrom!==i?'0 0 0 3px rgba(58,102,68,0.08)':'0 1px 3px rgba(42,42,36,0.05)',
                        userSelect:'none',
                      }}>
                      <span style={{color:'#c8c0b0',fontSize:16,flexShrink:0,padding:'0 2px'}}>⠿</span>
                      <span style={{width:7,height:7,borderRadius:'50%',background:'rgba(58,102,68,0.2)',border:'1.5px solid #3a6644',flexShrink:0,margin:'0 2px'}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:'0.9rem',color:'#2a2a24',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
                        {c.location&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',color:'#9e9e8f',letterSpacing:'0.06em',marginTop:2}}>{c.location}</div>}
                      </div>
                      <button
                        onClick={()=>{setBucket(b=>b.filter(x=>x.id!==c.id));setUnsaved(true);}}
                        style={{background:'none',border:'none',color:'#c8c0b0',fontSize:18,cursor:'pointer',padding:'4px 6px',borderRadius:4,lineHeight:1,flexShrink:0}}
                        onMouseEnter={e=>e.target.style.color='#c0554a'}
                        onMouseLeave={e=>e.target.style.color='#c8c0b0'}>×</button>
                    </div>
                  ))}
                </div>
              }
              {bucket.length>0&&saveBar(false)}
            </div>
          )}

          {/* TOP COURSES */}
          {tab==='group'&&(
            <div style={{paddingTop:20}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',color:'#9e9e8f',letterSpacing:'0.08em'}}>Bayesian avg · {allF.length} golfer{allF.length!==1?'s':''}</span>
                <button onClick={loadFriends} style={{background:'none',border:'1.5px solid #d8d0c0',borderRadius:6,color:'#9e9e8f',fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',letterSpacing:'0.06em',textTransform:'uppercase',padding:'5px 11px',cursor:'pointer'}}>↻ Refresh</button>
              </div>
              {lb.length===0
                ?<div style={{textAlign:'center',padding:'36px 0',color:'#b8b0a0',fontStyle:'italic',fontSize:'0.88rem'}}>No courses ranked yet — add yours in Played.</div>
                :lb.map((c,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<lb.length-1?'1px solid #f0ece4':'none'}}>
                    <span style={{fontFamily:"'Playfair Display',serif",fontStyle:'italic',fontSize:'1.05rem',color:i<3?'#3a6644':'#b8b0a0',minWidth:22,textAlign:'right'}}>{i+1}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'0.88rem',color:'#2a2a24',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:3,flexWrap:'wrap'}}>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.58rem',color:'#b8b0a0'}}>{c.people.slice(0,3).join(', ')}{c.people.length>3?` +${c.people.length-3}`:''}</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.55rem',color:'#9e9e8f',background:'#f5f2ee',borderRadius:3,padding:'1px 5px',flexShrink:0}}>{c.n} {c.n===1?'rating':'ratings'} · {c.ba.toFixed(1)}</span>
                      </div>
                    </div>
                    <div style={{width:64,height:3,background:'#ede8df',borderRadius:2,overflow:'hidden',flexShrink:0}}>
                      <div style={{height:'100%',background:i<3?'#3a6644':'#7a9e85',borderRadius:2,width:c.pct+'%',transition:'width 0.4s ease'}}/>
                    </div>
                  </div>
                ))
              }
            </div>
          )}

          {/* GOLFERS */}
          {tab==='golfers'&&!profileView&&(
            <div style={{paddingTop:20}}>
              {sectionLabel(`${allF.length} golfer${allF.length!==1?'s':''} in the group`)}
              {allF.map(f=><GolferCard key={f.name} f={f}/>)}
            </div>
          )}

          {/* PROFILE */}
          {tab==='golfers'&&profileView&&<ProfileView name={profileView}/>}

        </div>
      </div>

      {/* Modals & overlays */}
      {modal&&<AddModal prefill={modal.prefill} onConfirm={confirmNew} onClose={()=>setModal(null)}/>}
      {shareOpen&&<ShareModal golferName={golferName} courses={played} onClose={()=>setShare(false)}/>}
      {searchOpen&&(
        <SearchOverlay
          query={searchQuery} setQuery={setSearchQ}
          allFriends={allF} ME={golferName}
          onSelectGolfer={name=>{setSearch(false);setTab('golfers');setProfile(name);}}
          onClose={()=>setSearch(false)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
  // Register service worker for offline support and PWA install
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW registration failed:', err));
    });
  }

  // iOS PWA install prompt helper — show banner if not already installed
  window.addEventListener('load', () => {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandalone = window.navigator.standalone;
    const dismissed = sessionStorage.getItem('pwa-prompt-dismissed');
    if (isIOS && !isInStandalone && !dismissed) {
      const banner = document.getElementById('pwa-banner');
      if (banner) {
        setTimeout(() => { banner.style.transform = 'translateY(0)'; }, 2000);
      }
    }
  });
</script>

  position:fixed;bottom:0;left:0;right:0;z-index:9000;

">

      <strong style="font-family:'DM Mono',monospace;font-size:0.72rem;background:#f5f2ee;padding:1px 5px;border-radius:3px">Add to Home Screen</strong> to install
